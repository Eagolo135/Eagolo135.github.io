    expect_steps:
      - icon: 📋
        title: Discovery
        text: We'll discuss your business challenges, goals, and current processes to
          identify AI opportunities.
      - icon: 💡
        title: Strategy
        text: I'll provide initial insights on how AI can address your specific needs
          and create value for your business.
      - icon: 🎯
        title: Next Steps
        text: We'll outline potential solutions, timelines, and next steps if you decide
          to move forward.
    faq_heading: Frequently Asked Questions
    faqs:
      - question: Is the consultation really free?
        answer: Yes! The initial 30-minute consultation is completely free with no
          obligations. It's an opportunity for us to explore if we're a good
          fit.
      - question: What should I prepare for the call?
        answer: Come with a general idea of your business challenges or goals. No
          technical knowledge required – I'll help translate your needs into AI
          solutions.
      - question: What happens after the consultation?
        answer: If we decide to work together, I'll provide a detailed proposal with
          scope, timeline, and pricing. There's no pressure to commit during the
          call.
      - question: Do you work with businesses of all sizes?
        answer: Yes! I work with startups, SMBs, and enterprises. Each project is
          tailored to your specific needs and budget.
    alt_heading: Prefer to Email Instead?
    alt_text: Feel free to reach out directly at
    alt_button: View Contact Page
