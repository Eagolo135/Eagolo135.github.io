services:
  - title: AI Strategy & Consulting
    description: Develop comprehensive AI strategies aligned with your business
      goals. I help identify opportunities, assess feasibility, and create
      roadmaps for successful AI implementation.
    icon: 🎯
  - title: Machine Learning Solutions
    description: Design and deploy custom machine learning models tailored to your
      specific needs. From predictive analytics to recommendation systems, I
      build solutions that deliver results.
    icon: 🤖
  - title: Natural Language Processing
    description: Implement NLP solutions including chatbots, sentiment analysis,
      document processing, and language understanding systems to enhance
      customer experience and operational efficiency.
    icon: 💬
  - title: Computer Vision
    description: Develop computer vision applications for image recognition, object
      detection, video analysis, and visual quality control to automate visual
      inspection tasks.
    icon: 👁️
  - title: AI Integration & Deployment
    description: Seamlessly integrate AI models into your existing systems. I ensure
      smooth deployment, scalability, and maintenance of AI solutions in
      production environments.
    icon: ⚙️
  - title: Training & Workshops
    description: Empower your team with AI knowledge through customized training
      sessions and workshops. Build internal capability to sustain and grow your
      AI initiatives.
    icon: 📚
  - title: AI Automation Audits
    description: Comprehensive review of your existing workflows to identify
      high-impact automation opportunities using AI
    icon: 🚀
